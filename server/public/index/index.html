<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <link rel="icon" href="../image/webpage-icon.png">

        <link rel="stylesheet" href="index.css">
        <link rel="stylesheet" href="../utils/popUp/popUp.css">

        <script src="index.js" type="module" defer></script>
        <script src="../utils/popUp/popUp.js" type="module" defer></script>
        <script src="../utils/types.mjs" type="module" defer></script>
        <script src="../utils/responseHandler.js" type="module" defer></script>
    </head>
    <body class="flex-center">
        <form action="" class="flex-center">
            <p class="label">LOGIN</p>
            <div class="input-card">
                <img src="../image/login-username.png" alt="">
                <input type="text" name="username" id="username" placeholder="Username" >
            </div>
            <div class="input-card">
                <img src="../image/login-password.png" alt="">
                <input type="password" name="password" id="password" placeholder="Password">
            </div>
            <button type="button" class="login-button">Login</button>
            <p class="register-link">If you don't have an account, <a href="/register/register.html">Click Here</a></p>
        </form>
    </body>
</html>
