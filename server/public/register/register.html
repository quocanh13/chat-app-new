<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <link rel="icon" href="../image/chat-icon.png">

        <link rel="stylesheet" href="register.css">
        <link rel="stylesheet" href="../utils/popUp/popUp.css">

        <script src="register.js" type="module" defer></script>
        <script src="../utils/popUp/popUp.js" type="module" defer></script>
        <script src="../utils/types.mjs" type="module" defer></script>
        <script src="../utils/responseHandler.js" type="module" defer></script>
    </head>
    <body class="flex-center">

        <form action="" class="flex-center">

            <p class="label">REGISTER</p>

            <div class="input-card">
                <img src="../image/login-username.png" alt="">
                <input type="text" name="username" id="username" placeholder="Username" >
            </div>

            <div class="input-card">
                <img src="../image/login-password.png" alt="">
                <input type="password" name="password" id="password" placeholder="Password">
            </div>

            <div class="input-card">
                <img src="../image/login-real-name.png" alt="">
                <input type="text" name="name" id="name" placeholder="Your Name">
            </div>

            <button type="button" class="register-button">Register</button>

        </form>

    </body>
</html>
